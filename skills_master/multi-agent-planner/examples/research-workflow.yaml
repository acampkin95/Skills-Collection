# Research Workflow Example for Multi-Agent Planner
#
# This file demonstrates a complete research workflow including:
# - Initial research phase
# - Perplexity queries
# - Web verification
# - Synthesis
#
# Usage: Load this workflow configuration and execute phases sequentially

---
# ==============================================================================
# WORKFLOW METADATA
# ==============================================================================
workflow:
  id: "research-workflow-2024-001"
  name: "AI Development Tools Research"
  description: "Comprehensive research on AI-assisted development tools"
  version: "1.0.0"
  created_at: "2024-01-15T10:00:00Z"
  estimated_duration: "2-4 hours"
  created_by: "Research Specialist Agent"

# ==============================================================================
# RESEARCH PARAMETERS
# ==============================================================================
research:
  topic: "AI-Assisted Software Development Tools"
  questions:
    primary: "What are the leading AI tools for software development in 2024?"
    secondary:
      - "How do AI coding assistants compare in terms of accuracy and efficiency?"
      - "What are the cost considerations for enterprise adoption?"
      - "What security and privacy concerns exist with AI code generation?"
      - "How do these tools integrate with existing development workflows?"

  scope:
    in_scope:
      - "AI coding assistants (GitHub Copilot, Claude Code, etc.)"
      - "Code generation and completion tools"
      - "Automated testing and debugging tools"
      - "Documentation generation tools"
      - "Enterprise and team use cases"
    out_of_scope:
      - "General AI/ML frameworks"
      - "DevOps and CI/CD tools without AI components"
      - "IDE-specific plugins (focus on cross-platform)"

  requirements:
    min_sources: 15
    min_quality_score: 0.75
    max_cost: 5.00
    deadline: "2024-01-15T18:00:00Z"

# ==============================================================================
# PHASE CONFIGURATIONS
# ==============================================================================
phases:
  # --------------------------------------------------------------------------
  # PHASE 1: INITIAL RESEARCH (Discovery)
  # --------------------------------------------------------------------------
  - phase_id: "phase-1"
    name: "Initial Discovery"
    description: "Broad search to identify key tools and concepts"
    order: 1
    parallel: false
    timeout_minutes: 30
    tasks:
      - task_id: "task-1.1"
        name: "Overview Search"
        type: "perplexity_search"
        query: "What are the leading AI-powered software development tools in 2024?"
        focus_areas: ["general", "news"]
        max_results: 10
        output_key: "overview_results"

      - task_id: "task-1.2"
        name: "Market Analysis"
        type: "perplexity_search"
        query: "AI coding assistant market share and adoption trends 2024"
        focus_areas: ["news", "finance"]
        max_results: 8
        output_key: "market_results"

      - task_id: "task-1.3"
        name: "Feature Comparison"
        type: "perplexity_deep_research"
        query: "Compare features of major AI code generation tools including GitHub Copilot, Claude Code, Amazon CodeWhisperer, and Tabnine"
        focus_areas: ["documentation", "reviews"]
        max_results: 15
        output_key: "comparison_results"

  # --------------------------------------------------------------------------
  # PHASE 2: DETAILED INVESTIGATION
  # --------------------------------------------------------------------------
  - phase_id: "phase-2"
    name: "Detailed Investigation"
    description: "Deep dive into specific tools and use cases"
    order: 2
    parallel: true
    timeout_minutes: 60
    tasks:
      - task_id: "task-2.1"
        name: "GitHub Copilot Analysis"
        type: "perplexity_deep_research"
        query: "GitHub Copilot features, pricing, enterprise security, and user reviews in 2024"
        focus_areas: ["official", "reviews", "news"]
        max_results: 10
        output_key: "copilot_results"

      - task_id: "task-2.2"
        name: "Claude Code Analysis"
        type: "perplexity_deep_research"
        query: "Claude Code AI assistant capabilities, pricing, security, and developer experience"
        focus_areas: ["documentation", "news", "stackoverflow"]
        max_results: 10
        output_key: "claude_results"

      - task_id: "task-2.3"
        name: "CodeWhisperer Analysis"
        type: "perplexity_search"
        query: "Amazon CodeWhisperer vs GitHub Copilot comparison 2024"
        focus_areas: ["reviews", "news"]
        max_results: 8
        output_key: "codewhisperer_results"

      - task_id: "task-2.4"
        name: "Open Source Alternatives"
        type: "perplexity_search"
        query: "Open source AI code completion tools 2024 Tabnine StarCoder Code Llama"
        focus_areas: ["github", "documentation"]
        max_results: 8
        output_key: "opensource_results"

  # --------------------------------------------------------------------------
  # PHASE 3: WEB VERIFICATION
  # --------------------------------------------------------------------------
  - phase_id: "phase-3"
    name: "Web Verification"
    description: "Verify key findings with direct web fetches"
    order: 3
    parallel: true
    timeout_minutes: 45
    tasks:
      - task_id: "task-3.1"
        name: "Verify Pricing Pages"
        type: "web_fetch"
        urls:
          - "https://github.com/features/copilot"
          - "https://claude.com/claude-code"
          - "https://aws.amazon.com/codewhisperer/pricing"
        method: "GET"
        headers:
          Accept: "text/html"
        output_key: "pricing_pages"

      - task_id: "task-3.2"
        name: "Fetch Documentation"
        type: "web_fetch"
        urls:
          - "https://docs.github.com/en/copilot"
          - "https://docs.anthropic.com/claude-code"
        method: "GET"
        output_key: "documentation"

      - task_id: "task-3.3"
        name: "Gather User Reviews"
        type: "web_fetch"
        urls:
          - "https://www.g2.com/products/github-copilot/reviews"
          - "https://www.slant.co/topics/4232/~best-ai-programming-assistants"
        method: "GET"
        output_key: "user_reviews"

  # --------------------------------------------------------------------------
  # PHASE 4: COST AND SECURITY ANALYSIS
  # --------------------------------------------------------------------------
  - phase_id: "phase-4"
    name: "Cost and Security Analysis"
    description: "Research pricing, security, and enterprise considerations"
    order: 4
    parallel: false
    timeout_minutes: 30
    tasks:
      - task_id: "task-4.1"
        name: "Enterprise Security Research"
        type: "perplexity_search"
        query: "AI code generation security concerns enterprise data privacy 2024"
        focus_areas: ["news", "academic", "security"]
        max_results: 10
        output_key: "security_results"

      - task_id: "task-4.2"
        name: "Cost Analysis"
        type: "web_fetch"
        urls:
          - "https://github.com/pricing"
          - "https://www.tabnine.com/pricing"
        method: "GET"
        output_key: "cost_comparison"

  # --------------------------------------------------------------------------
  # PHASE 5: SYNTHESIS AND REPORT
  # --------------------------------------------------------------------------
  - phase_id: "phase-5"
    name: "Synthesis and Report"
    description: "Compile findings into comprehensive report"
    order: 5
    parallel: false
    timeout_minutes: 30
    tasks:
      - task_id: "task-5.1"
        name: "Generate Final Report"
        type: "synthesize"
        input_keys:
          - "overview_results"
          - "market_results"
          - "comparison_results"
          - "copilot_results"
          - "claude_results"
          - "codewhisperer_results"
          - "opensource_results"
          - "pricing_pages"
          - "documentation"
          - "user_reviews"
          - "security_results"
          - "cost_comparison"
        output_key: "final_report"
        template: "comprehensive_report"

# ==============================================================================
# RATE LIMITS AND CONSTRAINTS
# ==============================================================================
constraints:
  rate_limit:
    requests_per_minute: 30
    burst_limit: 5
    cost_budget_usd: 5.00

  quality:
    min_source_relevance: 0.6
    min_citations_per_source: 2
    require_verification: true

  timeouts:
    perplexity_search: 60
    perplexity_deep_research: 300
    web_fetch: 30
    total_workflow: 240

# ==============================================================================
# OUTPUT CONFIGURATION
# ==============================================================================
outputs:
  directory: "aistore/research/ai-dev-tools-2024"

  files:
    - filename: "phase-1-discovery.json"
      description: "Initial discovery phase results"
    - filename: "phase-2-investigation.json"
      description: "Detailed investigation results"
    - filename: "phase-3-verification.json"
      description: "Web verification results"
    - filename: "phase-4-analysis.json"
      description: "Cost and security analysis"
    - filename: "citations-index.json"
      description: "All citations from research"
    - filename: "final-report.md"
      description: "Comprehensive research report"
    - filename: "executive-summary.md"
      description: "Executive summary (2-page)"

  formats:
    - "json"
    - "markdown"
    - "html"

# ==============================================================================
# ERROR HANDLING
# ==============================================================================
error_handling:
  retry:
    max_attempts: 3
    backoff_multiplier: 2
    initial_delay_seconds: 1

  circuit_breaker:
    failure_threshold: 5
    recovery_timeout_seconds: 300

  fallback:
    enabled: true
    on_quota_exhausted: "use_web_fetch"
    on_timeout: "log_and_continue"

  notifications:
    on_error: "log"
    on_completion: "summary"
    on_budget_warning: "warning_log"

# ==============================================================================
# EXAMPLE EXECUTION SCRIPT
# ==============================================================================
execution:
  script: |
    #!/usr/bin/env python3
    """
    Research Workflow Execution Script
    Loads and executes the research-workflow.yaml configuration
    """

    import asyncio
    import json
    from pathlib import Path
    from datetime import datetime

    from scripts.research_specialist import (
        ResearchSpecialist,
        ResearchType,
        PerplexityClient,
        WebFetchClient,
    )
    from scripts.web_operations import WebFetcher, FetchOptions

    async def execute_workflow(config_path: str):
        """Execute the research workflow from YAML config"""
        # Load configuration
        config = load_yaml(config_path)

        # Initialize components
        specialist = ResearchSpecialist()
        web_fetcher = WebFetcher()

        results = {}
        total_cost = 0.0

        for phase in sorted(config["phases"], key=lambda p: p["order"]):
            print(f"\n{'='*60}")
            print(f"PHASE {phase['order']}: {phase['name']}")
            print(f"{'='*60}")

            phase_results = []

            # Execute tasks (parallel if specified)
            if phase.get("parallel", False):
                tasks = []
                for task in phase["tasks"]:
                    task_result = execute_task(task, specialist, web_fetcher)
                    tasks.append(task_result)

                phase_results = await asyncio.gather(*tasks, return_exceptions=True)
            else:
                for task in phase["tasks"]:
                    task_result = await execute_task(task, specialist, web_fetcher)
                    phase_results.append(task_result)

            # Store results
            for task, result in zip(phase["tasks"], phase_results):
                if not isinstance(result, Exception):
                    results[task["output_key"]] = result

            # Save phase results
            save_phase_results(phase, phase_results, config["outputs"]["directory"])

        # Generate final report
        report = generate_final_report(results, config["research"])
        save_report(report, config["outputs"]["directory"])

        # Generate citation report
        citation_report = await specialist.generate_citation_report(
            [r for r in results.values() if hasattr(r, "sources")]
        )
        save_citations(citation_report, config["outputs"]["directory"])

        print("\n" + "="*60)
        print("RESEARCH WORKFLOW COMPLETE")
        print("="*60)
        print(f"Total sources gathered: {citation_report['total_sources']}")
        print(f"Results saved to: {config['outputs']['directory']}")

    async def execute_task(task, specialist, web_fetcher):
        """Execute a single task from the workflow"""
        task_type = task["type"]

        if task_type == "perplexity_search":
            async with PerplexityClient() as client:
                return await client.search(
                    query=task["query"],
                    focus=task.get("focus_areas"),
                    max_results=task["max_results"]
                )

        elif task_type == "perplexity_deep_research":
            async with PerplexityClient() as client:
                return await client.deep_research(
                    query=task["query"],
                    focus_areas=task.get("focus_areas"),
                    max_sources=task["max_results"]
                )

        elif task_type == "web_fetch":
            options = FetchOptions(
                headers=task.get("headers", {}),
                timeout=task.get("timeout", 30)
            )
            results = []
            for url in task["urls"]:
                result = await web_fetcher.fetch(url, options)
                results.append(result)
            return results

        elif task_type == "synthesize":
            return synthesize_results(task["input_keys"], results, task["template"])

        else:
            raise ValueError(f"Unknown task type: {task_type}")

    def generate_final_report(results, research_config):
        """Generate the comprehensive final report"""
        return {
            "title": research_config["topic"],
            "generated_at": datetime.now().isoformat(),
            "research_questions": research_config["questions"],
            "findings": {
                "overview": results.get("overview_results", {}),
                "market_analysis": results.get("market_results", {}),
                "tool_comparison": results.get("comparison_results", {}),
                "detailed_analysis": {
                    "copilot": results.get("copilot_results", {}),
                    "claude": results.get("claude_results", {}),
                    "codewhisperer": results.get("codewhisperer_results", {}),
                    "opensource": results.get("opensource_results", {}),
                },
                "verification": {
                    "pricing": results.get("pricing_pages", []),
                    "documentation": results.get("documentation", []),
                    "reviews": results.get("user_reviews", []),
                },
                "security_analysis": results.get("security_results", {}),
                "cost_comparison": results.get("cost_comparison", []),
            },
            "recommendations": [],
            "limitations": [],
        }

    if __name__ == "__main__":
        import sys
        config_path = sys.argv[1] if len(sys.argv) > 1 else "examples/research-workflow.yaml"
        asyncio.run(execute_workflow(config_path))

# ==============================================================================
# EXAMPLE OUTPUT (What the workflow produces)
# ==============================================================================
example_output:
  final_report_structure:
    - title: "AI-Assisted Software Development Tools - 2024 Research Report"
    - sections:
        - "Executive Summary"
        - "Introduction"
        - "Market Overview"
        - "Tool Comparisons"
          - subsections:
            - "GitHub Copilot"
            - "Claude Code"
            - "Amazon CodeWhisperer"
            - "Open Source Alternatives"
        - "Pricing Analysis"
        - "Security and Privacy Considerations"
        - "Enterprise Adoption Recommendations"
        - "Conclusion"
        - "Appendices"
          - "Full Citation Index"
          - "Methodology Description"
          - "Data Tables"

  citation_index_sample:
    - source_id: "src-001"
      title: "GitHub Copilot Features"
      url: "https://github.com/features/copilot"
      relevance_score: 0.95
      type: "official"
    - source_id: "src-002"
      title: "Claude Code AI Assistant Review"
      url: "https://www.anthropic.com/claude-code"
      relevance_score: 0.92
      type: "official"
    - source_id: "src-003"
      title: "AI Code Generation Market Analysis"
      url: "https://www.gartner.com/en/articles/ai-code-generation"
      relevance_score: 0.88
      type: "industry_report"

  metrics:
    total_sources: 25
    verified_sources: 20
    average_relevance: 0.82
    total_cost_estimate: "$3.50"
    completion_time: "2h 15m"
