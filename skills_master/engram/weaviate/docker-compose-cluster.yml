# Weaviate Memory System - Multi-node HA Cluster
# 3-node RAFT consensus cluster for high availability

services:
  weaviate-node1:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    container_name: weaviate-node1
    restart: unless-stopped
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    ports:
      - "8080:8080"
      - "50051:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-ollama'
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama,backup-filesystem'
      OLLAMA_API_ENDPOINT: 'http://host.docker.internal:11434'
      
      # Cluster Configuration
      CLUSTER_HOSTNAME: 'node1'
      CLUSTER_GOSSIP_BIND_PORT: '7100'
      CLUSTER_DATA_BIND_PORT: '7101'
      CLUSTER_JOIN: 'weaviate-node1:7100,weaviate-node2:7100,weaviate-node3:7100'
      
      # Replication
      REPLICATION_MINIMUM_FACTOR: '2'
      
      # RAFT Configuration
      RAFT_JOIN: 'node1,node2,node3'
      RAFT_BOOTSTRAP_EXPECT: '3'
      
      GOMEMLIMIT: '4GiB'
      PROMETHEUS_MONITORING_ENABLED: 'true'
      
    volumes:
      - weaviate_node1_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - weaviate-cluster

  weaviate-node2:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    container_name: weaviate-node2
    restart: unless-stopped
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    ports:
      - "8081:8080"
      - "50052:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-ollama'
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama,backup-filesystem'
      OLLAMA_API_ENDPOINT: 'http://host.docker.internal:11434'
      
      CLUSTER_HOSTNAME: 'node2'
      CLUSTER_GOSSIP_BIND_PORT: '7100'
      CLUSTER_DATA_BIND_PORT: '7101'
      CLUSTER_JOIN: 'weaviate-node1:7100,weaviate-node2:7100,weaviate-node3:7100'
      
      REPLICATION_MINIMUM_FACTOR: '2'
      RAFT_JOIN: 'node1,node2,node3'
      RAFT_BOOTSTRAP_EXPECT: '3'
      
      GOMEMLIMIT: '4GiB'
      PROMETHEUS_MONITORING_ENABLED: 'true'
      
    volumes:
      - weaviate_node2_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - weaviate-cluster
    depends_on:
      - weaviate-node1

  weaviate-node3:
    image: cr.weaviate.io/semitechnologies/weaviate:1.28.4
    container_name: weaviate-node3
    restart: unless-stopped
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8080'
      - --scheme
      - http
    ports:
      - "8082:8080"
      - "50053:50051"
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: 'true'
      PERSISTENCE_DATA_PATH: '/var/lib/weaviate'
      DEFAULT_VECTORIZER_MODULE: 'text2vec-ollama'
      ENABLE_MODULES: 'text2vec-ollama,generative-ollama,backup-filesystem'
      OLLAMA_API_ENDPOINT: 'http://host.docker.internal:11434'
      
      CLUSTER_HOSTNAME: 'node3'
      CLUSTER_GOSSIP_BIND_PORT: '7100'
      CLUSTER_DATA_BIND_PORT: '7101'
      CLUSTER_JOIN: 'weaviate-node1:7100,weaviate-node2:7100,weaviate-node3:7100'
      
      REPLICATION_MINIMUM_FACTOR: '2'
      RAFT_JOIN: 'node1,node2,node3'
      RAFT_BOOTSTRAP_EXPECT: '3'
      
      GOMEMLIMIT: '4GiB'
      PROMETHEUS_MONITORING_ENABLED: 'true'
      
    volumes:
      - weaviate_node3_data:/var/lib/weaviate
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - weaviate-cluster
    depends_on:
      - weaviate-node1

volumes:
  weaviate_node1_data:
  weaviate_node2_data:
  weaviate_node3_data:

networks:
  weaviate-cluster:
    driver: bridge
